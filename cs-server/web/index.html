<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS Automation</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- ── 로그인 화면 ────────────────────────────────────────────── -->
  <div id="login-view" class="view">
    <div class="card login-card">
      <div class="logo">CS</div>
      <h1>CS Automation</h1>
      <p class="subtitle">아이디와 비밀번호로 로그인하세요</p>
      <form id="login-form" autocomplete="on">
        <label for="login-id">아이디</label>
        <input id="login-id" type="text" autocomplete="username" placeholder="cs001">
        <label for="login-pw">비밀번호</label>
        <input id="login-pw" type="password" autocomplete="current-password" placeholder="비밀번호">
        <div id="login-error" class="error-text"></div>
        <button type="submit" class="btn-primary">로그인</button>
      </form>
    </div>
  </div>

  <!-- ── 서비스 선택 화면 ───────────────────────────────────────── -->
  <div id="service-view" class="view hidden">
    <div class="topbar">
      <div class="topbar-title">서비스 선택</div>
      <div class="topbar-actions">
        <span id="service-user" class="user-chip"></span>
        <button id="logout-btn" class="btn-ghost">로그아웃</button>
      </div>
    </div>
    <div class="service-wrap">
      <p id="service-hint" class="hint">담당하실 서비스를 선택하세요</p>
      <div id="service-list" class="service-list"></div>
    </div>
  </div>

  <!-- ── 채팅 화면 ─────────────────────────────────────────────── -->
  <div id="chat-view" class="view hidden">
    <div class="chat-header">
      <div class="mini-logo">CS</div>
      <div class="chat-titles">
        <div id="chat-service" class="chat-service">CS Agent</div>
        <div class="chat-sub">AI 데이터 조회 어시스턴트</div>
      </div>
      <div class="chat-actions">
        <button id="change-service-btn" class="btn-ghost">서비스 변경</button>
        <button id="chat-logout-btn" class="btn-ghost">로그아웃</button>
      </div>
    </div>
    <div id="messages" class="messages"></div>
    <div id="status-line" class="status-line hidden"></div>
    <div class="input-bar">
      <textarea id="chat-input" rows="1"
        placeholder="질문을 입력하세요   (Enter 전송 · Shift+Enter 줄바꿈)"></textarea>
      <button id="send-btn" class="btn-primary send-btn">전송</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
