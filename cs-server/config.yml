server:
  host: "0.0.0.0"
  port: 8765

database:
  host: "localhost"
  port: 3306
  name: "your_database_name"
  user: "your_db_user"
  password: "your_db_password"

github:
  repo_url: "https://github.com/yourorg/yourrepo"
  branch: "main"
  local_path: "./repo"

claude:
  # 개발자 PC에 설치된 Claude CLI(Claude Code)를 사용합니다.
  # model은 CLI에 전달할 모델 별칭 또는 ID입니다. (예: sonnet, opus, claude-sonnet-4-6)
  # 비워두면 CLI 기본 모델을 사용합니다.
  model: "sonnet"

# CS 담당자가 선택할 수 있는 서비스 목록
services:
  - id: "order_inquiry"
    name: "주문 조회"
    description: "고객 주문 관련 정보를 조회합니다 (주문 상태, 주문 내역 등)"
  - id: "customer_info"
    name: "고객 정보 조회"
    description: "고객 기본 정보를 조회합니다 (회원 정보, 가입일 등)"
  - id: "delivery_check"
    name: "배송 조회"
    description: "배송 현황 및 배송 정보를 조회합니다"
  - id: "refund_check"
    name: "환불 조회"
    description: "환불 요청 및 처리 상태를 조회합니다"

# 웹 페이지에 로그인할 수 있는 사용자 목록
#   id / password : 로그인 계정
#   name          : 화면에 표시할 이름
#   services      : 접근 가능한 서비스 id 목록. ["*"] 이면 모든 서비스 접근 가능
users:
  - id: "admin"
    password: "changeme"
    name: "관리자"
    services: ["*"]
  - id: "cs001"
    password: "changeme"
    name: "김상담"
    services: ["order_inquiry", "delivery_check"]
  - id: "cs002"
    password: "changeme"
    name: "이상담"
    services: ["customer_info", "refund_check"]
