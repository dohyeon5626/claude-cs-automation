# ─────────────────────────────────────────────────────────────
#  CS Automation 설정 파일
# ─────────────────────────────────────────────────────────────

server:
  host: "0.0.0.0"        # 0.0.0.0 이면 같은 네트워크의 다른 PC에서도 접속 가능
  port: 8765

claude:
  model: "sonnet"        # 비워두면 Claude CLI 기본 모델 사용


# ── 서비스 ─────────────────────────────────────────────────────
# 서비스마다 자기 데이터베이스와 GitHub 레포를 각각 설정합니다.
services:
  - id: "order"
    name: "주문 서비스"
    description: "주문 조회 및 배송 상태 확인"
    database:
      host: "localhost"
      port: 3306
      name: "order_db"
      user: "readonly_user"
      password: "db_password"
    github:
      url: "https://github.com/yourorg/order-service"
      branch: "main"


# ── 사용자 ─────────────────────────────────────────────────────
# 웹에 로그인하는 계정입니다.
#   services : 접근 가능한 서비스 id 목록. ["*"] 이면 모든 서비스 접근 가능
users:
  - id: "admin"
    password: "changeme"
    name: "관리자"
    services: ["*"]

  - id: "cs001"
    password: "changeme"
    name: "김상담"
    services: ["order"]
