# ─────────────────────────────────────────────────────────────
#  CS Automation 설정 파일
# ─────────────────────────────────────────────────────────────

server:
  port: 8765             # 웹 접속 포트 (같은 WiFi의 다른 PC에서 이 포트로 접속)

brand:
  name: "CS Automation"  # 사이드바/로그인에 표시될 이름
  logo: ""               # 이미지 URL("https://...") 또는 로컬 경로("./assets/logo.png")
                         # 비우면 brand.name 의 첫 글자가 그라데이션 사각형 안에 표시됩니다.

claude:
  model: "sonnet"        # 비워두면 Claude CLI 기본 모델 사용
  path: "/Users/dohyeon5626/.vscode/extensions/anthropic.claude-code-2.1.145-darwin-arm64/resources/native-binary/claude"


# ── 서비스 ─────────────────────────────────────────────────────
# 서비스마다 자기 데이터베이스와 GitHub 레포를 각각 설정합니다.
# database 는 선택 사항입니다 — 없으면 Claude가 레포 코드/문서만 보고 답합니다.
services:
  - id: "serverless"
    name: "테스트"
    description: "서버리스 프로젝트"
    # logo 가 비어 있으면 서비스 이름 첫 글자로 자동 아이콘이 만들어집니다.
    # 채우면 URL 또는 로컬 경로 사용 가능.
    logo: ""
    github:
      url: "https://github.com/dohyeon5626/serverless-functions"
      branch: "main"


# ── 사용자 ─────────────────────────────────────────────────────
# 웹에 로그인하는 계정입니다.
#   services : 접근 가능한 서비스 id 목록. ["*"] 이면 모든 서비스 접근 가능
users:
  - id: "admin"
    password: "admin"
    name: "테스트"
    services: ["*"]
