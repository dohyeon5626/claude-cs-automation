<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{BRAND_NAME}}</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="/logo">
  <link rel="apple-touch-icon" href="/logo">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="{{BRAND_NAME}}">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-slate-100 text-slate-900 antialiased h-screen overflow-hidden flex items-center justify-center">

  <!-- ── 로그인 ──────────────────────────────────────────────── -->
  <div id="login-view" class="hidden">
    <div class="bg-white border border-slate-200 rounded-2xl shadow-lg w-[400px] max-w-full p-8">
      <!-- Brand -->
      <div class="flex items-center gap-2.5 mb-7">
        {{BRAND_LOGO_LG}}
        <span class="text-sm font-semibold text-slate-900">{{BRAND_NAME}}</span>
      </div>

      <h1 class="text-xl font-bold text-slate-900">로그인</h1>
      <p class="text-sm text-slate-500 mt-1 mb-7">아이디와 비밀번호를 입력해 주세요.</p>

      <form id="login-form" autocomplete="on" class="space-y-4">
        <div>
          <label for="login-id" class="block text-xs font-medium text-slate-600 mb-1.5">아이디</label>
          <input id="login-id" type="text" autocomplete="username" placeholder="cs001"
                 class="w-full h-10 bg-white border border-slate-300 rounded-lg px-3 text-sm placeholder:text-slate-400 focus:border-slate-400 focus:ring-2 focus:ring-slate-200 outline-none transition">
        </div>
        <div>
          <label for="login-pw" class="block text-xs font-medium text-slate-600 mb-1.5">비밀번호</label>
          <input id="login-pw" type="password" autocomplete="current-password" placeholder="비밀번호"
                 class="w-full h-10 bg-white border border-slate-300 rounded-lg px-3 text-sm placeholder:text-slate-400 focus:border-slate-400 focus:ring-2 focus:ring-slate-200 outline-none transition">
        </div>
        <div id="login-error" class="text-sm text-red-500 min-h-[20px]"></div>
        <button type="submit" class="w-full h-10 bg-slate-900 hover:bg-slate-800 disabled:bg-slate-300 text-white text-sm font-medium rounded-lg transition shadow-sm">로그인</button>
      </form>
    </div>
  </div>

  <!-- ── 메인 (사이드바 + 채팅) ──────────────────────────────── -->
  <div id="app-view" class="hidden w-full max-w-[1600px] h-full bg-white border-x border-slate-200 overflow-hidden flex">

    <!-- 사이드바 -->
    <aside class="w-60 bg-white border-r border-slate-200 flex flex-col shrink-0">
      <div class="h-14 px-4 flex items-center gap-2.5 border-b border-slate-200 shrink-0">
        {{BRAND_LOGO_SM}}
        <span class="text-sm font-semibold text-slate-900 truncate">{{BRAND_NAME}}</span>
      </div>

      <div class="flex-1 overflow-y-auto p-2.5">
        <div id="service-list" class="space-y-0.5"></div>
      </div>

      <div class="h-[65px] border-t border-slate-200 px-4 shrink-0 flex items-center gap-3">
        <div class="flex-1 min-w-0">
          <div id="user-name" class="text-sm font-medium text-slate-900 truncate"></div>
          <div id="user-id" class="text-xs text-slate-500 truncate"></div>
        </div>
        <button id="stats-btn" class="hidden text-xs text-slate-500 hover:text-slate-900 transition shrink-0">통계</button>
        <button id="logout-btn" class="text-xs text-slate-500 hover:text-slate-900 transition shrink-0">로그아웃</button>
      </div>
    </aside>

    <!-- 채팅 -->
    <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
      <header class="h-14 bg-white border-b border-slate-200 flex items-center px-6 shrink-0 gap-3">
        <div id="chat-service-icon" class="hidden w-8 h-8 rounded-lg flex items-center justify-center font-semibold text-sm shrink-0"></div>
        <div class="min-w-0 flex-1">
          <div id="chat-service" class="text-sm font-semibold text-slate-900 truncate">서비스를 선택해 주세요</div>
          <div id="chat-description" class="text-xs text-slate-500 truncate"></div>
        </div>

        <!-- 대화 내역 초기화 -->
        <button id="clear-history-btn"
                class="hidden text-xs font-medium text-slate-700 hover:text-slate-900 px-2 py-1 rounded border border-slate-200 hover:border-slate-300 transition shrink-0">
          대화내역 삭제
        </button>

        <!-- Claude CLI 계정 상태 (관리자만 보임) -->
        <div id="claude-status" class="hidden items-center gap-2 shrink-0">
          <span id="claude-status-dot" class="w-2 h-2 rounded-full bg-slate-300"></span>
          <span id="claude-status-text" class="text-xs text-slate-500">Claude 확인 중...</span>
          <button id="claude-login-btn"
                  class="text-xs font-medium text-slate-700 hover:text-slate-900 px-2 py-1 rounded border border-slate-200 hover:border-slate-300 transition">
            Claude CLI 열기
          </button>
        </div>
      </header>

      <div id="messages" class="flex-1 overflow-y-auto p-6 flex flex-col gap-3">
        <div id="empty-state" class="flex-1 flex items-center justify-center text-sm text-slate-400 hidden">
          조회할 내용을 입력해 주세요
        </div>
      </div>

      <div id="status-line" class="h-6 text-xs text-slate-400 shrink-0 opacity-0 transition-opacity flex items-center justify-center gap-1.5">
        <svg class="w-3 h-3 animate-spin shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
          <circle cx="12" cy="12" r="9" stroke-opacity="0.25"/>
          <path d="M12 3a9 9 0 0 1 9 9"/>
        </svg>
        <span id="status-text" class="truncate"></span>
      </div>

      <div class="bg-white border-t border-slate-200 px-4 py-3 shrink-0 flex items-end gap-2">
        <textarea id="chat-input" rows="1"
                  placeholder="조회할 내용을 입력해 주세요  (Enter 전송 · Shift+Enter 줄바꿈)"
                  class="flex-1 bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm placeholder:text-slate-400 resize-none max-h-32 focus:border-slate-400 focus:ring-2 focus:ring-slate-200 outline-none disabled:opacity-50 transition"></textarea>
        <button id="send-btn" aria-label="전송"
                class="w-10 h-10 bg-slate-900 hover:bg-slate-800 active:scale-[0.97] disabled:bg-slate-200 disabled:text-slate-400 disabled:active:scale-100 text-white rounded-lg flex items-center justify-center shrink-0 transition shadow-sm hover:shadow-md">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4">
            <path d="M12 19V5"/>
            <path d="M5 12l7-7 7 7"/>
          </svg>
        </button>
      </div>
    </main>

  </div>

  <!-- ── 통계 모달 (관리자 전용) ─────────────────────────────── -->
  <div id="stats-modal" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl flex flex-col max-h-[85vh]">
      <div class="px-6 py-4 border-b border-slate-200 flex items-center gap-3 shrink-0">
        <span class="text-sm font-semibold text-slate-900">쿼리 통계</span>
        <button id="stats-close" class="ml-auto text-slate-400 hover:text-slate-700 text-xl leading-none">×</button>
      </div>
      <div id="stats-body" class="flex-1 overflow-y-auto p-6 space-y-6">
        <div class="text-sm text-slate-400 text-center py-8">불러오는 중...</div>
      </div>
    </div>
  </div>

  <!-- ── Claude CLI 터미널 모달 ───────────────────────────────── -->
  <div id="claude-login-modal" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-[#1e1e1e] rounded-xl shadow-2xl w-full max-w-4xl flex flex-col"
         style="height: 600px;">
      <div class="px-4 py-2 border-b border-slate-700 flex items-center gap-3 bg-slate-800 rounded-t-xl">
        <div class="flex gap-1.5">
          <span class="w-3 h-3 rounded-full bg-rose-400"></span>
          <span class="w-3 h-3 rounded-full bg-amber-400"></span>
          <span class="w-3 h-3 rounded-full bg-emerald-400"></span>
        </div>
        <span class="text-xs text-slate-300 font-mono">claude</span>
        <span id="claude-login-status" class="text-xs text-slate-400 ml-2"></span>
        <button id="claude-login-close" class="ml-auto text-slate-400 hover:text-white text-xl leading-none">×</button>
      </div>
      <div id="claude-login-terminal" class="flex-1 px-2 py-2 overflow-hidden bg-[#1e1e1e] rounded-b-xl" style="min-height: 400px"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script src="/app.js"></script>
</body>
</html>
