<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{BRAND_NAME}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-slate-50 text-slate-900 antialiased h-screen overflow-hidden">

  <!-- ── 로그인 ──────────────────────────────────────────────── -->
  <div id="login-view" class="hidden h-screen flex items-center justify-center p-6">
    <div class="bg-white border border-slate-200 rounded-2xl shadow-sm w-[400px] max-w-full p-8">
      <!-- Brand -->
      <div class="flex items-center gap-2.5 mb-7">
        {{BRAND_LOGO_LG}}
        <span class="text-sm font-semibold text-slate-900">{{BRAND_NAME}}</span>
      </div>

      <h1 class="text-xl font-bold text-slate-900">로그인</h1>
      <p class="text-sm text-slate-500 mt-1 mb-7">아이디와 비밀번호를 입력해 주세요.</p>

      <form id="login-form" autocomplete="on" class="space-y-4">
        <div>
          <label for="login-id" class="block text-xs font-medium text-slate-600 mb-1.5">아이디</label>
          <input id="login-id" type="text" autocomplete="username" placeholder="cs001"
                 class="w-full h-10 bg-white border border-slate-300 rounded-lg px-3 text-sm placeholder:text-slate-400 focus:border-slate-400 focus:ring-2 focus:ring-slate-200 outline-none transition">
        </div>
        <div>
          <label for="login-pw" class="block text-xs font-medium text-slate-600 mb-1.5">비밀번호</label>
          <input id="login-pw" type="password" autocomplete="current-password" placeholder="비밀번호"
                 class="w-full h-10 bg-white border border-slate-300 rounded-lg px-3 text-sm placeholder:text-slate-400 focus:border-slate-400 focus:ring-2 focus:ring-slate-200 outline-none transition">
        </div>
        <div id="login-error" class="text-sm text-red-500 min-h-[20px]"></div>
        <button type="submit" class="w-full h-10 bg-slate-900 hover:bg-slate-800 disabled:bg-slate-300 text-white text-sm font-medium rounded-lg transition shadow-sm">로그인</button>
      </form>
    </div>
  </div>

  <!-- ── 메인 (사이드바 + 채팅) ──────────────────────────────── -->
  <div id="app-view" class="hidden flex h-screen">

    <!-- 사이드바 -->
    <aside class="w-60 bg-white border-r border-slate-200 flex flex-col shrink-0">
      <div class="h-14 px-4 flex items-center gap-2.5 border-b border-slate-200 shrink-0">
        {{BRAND_LOGO_SM}}
        <span class="text-sm font-semibold text-slate-900 truncate">{{BRAND_NAME}}</span>
      </div>

      <div class="flex-1 overflow-y-auto p-2.5">
        <div id="service-list" class="space-y-0.5"></div>
      </div>

      <div class="h-[65px] border-t border-slate-200 px-4 shrink-0 flex items-center gap-3">
        <div class="flex-1 min-w-0">
          <div id="user-name" class="text-sm font-medium text-slate-900 truncate"></div>
          <div id="user-id" class="text-xs text-slate-500 truncate"></div>
        </div>
        <button id="logout-btn" class="text-xs text-slate-500 hover:text-slate-900 transition shrink-0">로그아웃</button>
      </div>
    </aside>

    <!-- 채팅 -->
    <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
      <header class="h-14 bg-white border-b border-slate-200 flex items-center px-6 shrink-0 gap-3">
        <div id="chat-service-icon" class="hidden w-8 h-8 rounded-lg flex items-center justify-center font-semibold text-sm shrink-0"></div>
        <div class="min-w-0 flex-1">
          <div id="chat-service" class="text-sm font-semibold text-slate-900 truncate">서비스를 선택해 주세요</div>
          <div id="chat-description" class="text-xs text-slate-500 truncate"></div>
        </div>
      </header>

      <div id="messages" class="flex-1 overflow-y-auto p-6 flex flex-col gap-3">
        <div id="empty-state" class="flex-1 flex items-center justify-center text-sm text-slate-400 hidden">
          조회할 내용을 입력해 주세요
        </div>
      </div>

      <div id="status-line" class="h-6 text-xs text-slate-400 shrink-0 opacity-0 transition-opacity flex items-center justify-center gap-1.5">
        <svg class="w-3 h-3 animate-spin shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
          <circle cx="12" cy="12" r="9" stroke-opacity="0.25"/>
          <path d="M12 3a9 9 0 0 1 9 9"/>
        </svg>
        <span id="status-text" class="truncate"></span>
      </div>

      <div class="bg-white border-t border-slate-200 px-4 py-3 shrink-0 flex items-end gap-2">
        <textarea id="chat-input" rows="1"
                  placeholder="조회할 내용을 입력해 주세요  (Enter 전송 · Shift+Enter 줄바꿈)"
                  class="flex-1 bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm placeholder:text-slate-400 resize-none max-h-32 focus:border-slate-400 focus:ring-2 focus:ring-slate-200 outline-none disabled:opacity-50 transition"></textarea>
        <button id="send-btn" aria-label="전송"
                class="w-10 h-10 bg-slate-900 hover:bg-slate-800 active:scale-[0.97] disabled:bg-slate-200 disabled:text-slate-400 disabled:active:scale-100 text-white rounded-lg flex items-center justify-center shrink-0 transition shadow-sm hover:shadow-md">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4">
            <path d="M12 19V5"/>
            <path d="M5 12l7-7 7 7"/>
          </svg>
        </button>
      </div>
    </main>

  </div>

  <script src="/app.js"></script>
</body>
</html>
