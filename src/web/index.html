<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS Automation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-slate-50 text-slate-900 antialiased h-screen overflow-hidden">

  <!-- ── 로그인 ──────────────────────────────────────────────── -->
  <div id="login-view" class="hidden h-screen flex items-center justify-center p-6">
    <div class="bg-white border border-slate-200 rounded-2xl shadow-sm w-96 max-w-full p-8">
      <h1 class="text-xl font-semibold mb-1">로그인</h1>
      <p class="text-sm text-slate-500 mb-6">CS Automation 사용을 위해 로그인하세요.</p>
      <form id="login-form" autocomplete="on">
        <label for="login-id" class="block text-xs font-medium text-slate-600 mb-1.5">아이디</label>
        <input id="login-id" type="text" autocomplete="username" placeholder="cs001"
               class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none">
        <label for="login-pw" class="block text-xs font-medium text-slate-600 mt-4 mb-1.5">비밀번호</label>
        <input id="login-pw" type="password" autocomplete="current-password" placeholder="비밀번호"
               class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none">
        <div id="login-error" class="text-sm text-red-500 mt-3 min-h-[20px]"></div>
        <button type="submit" class="w-full mt-2 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-medium py-2.5 rounded-lg transition">로그인</button>
      </form>
    </div>
  </div>

  <!-- ── 메인 (사이드바 + 채팅) ──────────────────────────────── -->
  <div id="app-view" class="hidden flex h-screen">

    <!-- 사이드바 -->
    <aside class="w-60 bg-white border-r border-slate-200 flex flex-col shrink-0">
      <div class="h-14 px-4 flex items-center border-b border-slate-200 shrink-0">
        <span class="text-sm font-semibold text-slate-700">CS Automation</span>
      </div>
      <div class="flex-1 overflow-y-auto p-2.5">
        <div id="service-list" class="space-y-0.5"></div>
      </div>
      <div class="border-t border-slate-200 px-4 py-3 shrink-0">
        <div id="user-name" class="text-sm font-medium text-slate-700 truncate"></div>
        <button id="logout-btn" class="mt-0.5 text-xs text-slate-500 hover:text-slate-800 transition">로그아웃</button>
      </div>
    </aside>

    <!-- 채팅 -->
    <main class="flex-1 flex flex-col min-w-0">
      <header class="h-14 bg-white border-b border-slate-200 flex items-center px-6 shrink-0">
        <div id="chat-service" class="font-semibold text-slate-700 truncate">서비스를 선택하세요</div>
      </header>
      <div id="messages" class="flex-1 overflow-y-auto p-6 flex flex-col gap-3"></div>
      <div id="status-line" class="text-xs text-slate-400 text-center py-1 shrink-0 hidden truncate"></div>
      <div class="bg-white border-t border-slate-200 p-3 flex gap-2 items-end shrink-0">
        <textarea id="chat-input" rows="1"
                  placeholder="질문을 입력하세요   (Enter 전송 · Shift+Enter 줄바꿈)"
                  class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm resize-none max-h-32 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none disabled:bg-slate-50 disabled:text-slate-400"></textarea>
        <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-medium px-5 rounded-lg h-[42px] shrink-0">전송</button>
      </div>
    </main>

  </div>

  <script src="/app.js"></script>
</body>
</html>
